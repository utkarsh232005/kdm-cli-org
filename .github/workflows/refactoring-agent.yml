# CodeScene PR Refactoring Agent
# Lets reviewers trigger Code Health-guided refactoring directly from PRs.
# Triggered by commenting `/cs-agent` on any pull request.
#
# Prerequisites:
#   1. CodeScene Delta Analysis must be enabled on this repo.
#   2. Add the following repository secrets (Settings → Secrets and variables → Actions):
#      - CODESCENE_ACCESS_TOKEN: CodeScene Cloud PAT (https://codescene.io/users/me/pat)
#      - At least one AI provider key (pick one or more):
#        - ANTHROPIC_API_KEY
#        - OPENAI_API_KEY
#        - GOOGLE_API_KEY
#
# Available Skills:
#   - skill:fix-code-health-degradations  — Fix only Code Health regressions introduced by the PR
#   - skill:uplift-code-health            — Raise Code Health toward a target score
#
# Usage:
#   Comment `/cs-agent` on any PR to trigger the agent.

name: PR Refactoring Agent

on:
  issue_comment:
    types: [created]

jobs:
  refactor:
    # Only run on PR comments that start with /cs-agent
    if: github.event.issue.pull_request != null && contains(github.event.comment.body, '/cs-agent')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: codescene-oss/pr-refactoring-agent@v1
        with:
          pr_number: ${{ github.event.issue.number }}
          command: ${{ github.event.comment.body }}
          model: 'anthropic/claude-sonnet-4-6-20251101'
          codescene_token: ${{ secrets.CODESCENE_ACCESS_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          google_api_key: ${{ secrets.GOOGLE_API_KEY }}

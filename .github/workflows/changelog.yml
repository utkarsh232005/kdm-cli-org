name: Auto Changelog

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*.*.*'

jobs:
  generate-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Changelog/Release Notes
        id: github_release
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          configuration: |
            {
              "categories": [
                { "title": "### Features", "labels": ["feature", "feat"] },
                { "title": "### Fixes", "labels": ["fix", "bug"] },
                { "title": "### Improvements", "labels": ["perf", "refactor"] },
                { "title": "### Documentation", "labels": ["doc", "docs"] }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save Versioned Docs Management Changelog
        run: |
          # 1. Create the target directory structure if it doesn't exist
          mkdir -p docs/changelogs
          
          # 2. Define the filename dynamically using the current release tag string
          # Example output path: docs/changelogs/v2.1.0.md
          VERSION_FILE="docs/changelogs/${{ github.ref_name }}.md"
          
          # 3. Write clean header structure and populate it with generated release notes
          echo -e "# Release Notes for ${{ github.ref_name }}\n" > "$VERSION_FILE"
          echo -e "Published on: $(date +'%Y-%m-%d')\n" >> "$VERSION_FILE"
          echo -e "${{ steps.github_release.outputs.changelog }}" >> "$VERSION_FILE"

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Stage the entire docs directory to track the new file addition
          git add docs/
          
          git commit -m "chore: add version doc changelog for ${{ github.ref_name }} [skip ci]"
          git push origin HEAD:${{ github.event.repository.default_branch }}
